(function(){const cv=document.getElementById("ptCanvas"),ctx=cv.getContext("2d");let W,H;function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}resize();window.addEventListener("resize",resize);const N=55,pts=Array.from({length:N},()=>({x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*.00025,vy:(Math.random()-.5)*.00025,r:Math.random()*1.6+.5,op:Math.random()*.3+.08,phase:Math.random()*Math.PI*2,ps:.008+Math.random()*.006})),CONN=120;function draw(){ctx.clearRect(0,0,W,H);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.phase+=p.ps;if(p.x<0)p.x=1;if(p.x>1)p.x=0;if(p.y<0)p.y=1;if(p.y>1)p.y=0;const pulse=Math.sin(p.phase)*.5+.5,alpha=p.op*(0.4+pulse*.6);ctx.beginPath();ctx.arc(p.x*W,p.y*H,p.r*(0.8+pulse*.4),0,Math.PI*2);ctx.fillStyle=`rgba(168,85,247,${alpha})`;ctx.shadowColor="rgba(168,85,247,.8)";ctx.shadowBlur=p.r*5;ctx.fill();ctx.shadowBlur=0;});for(let i=0;i<N;i++)for(let j=i+1;j<N;j++){const dx=(pts[i].x-pts[j].x)*W,dy=(pts[i].y-pts[j].y)*H,dist=Math.sqrt(dx*dx+dy*dy);if(dist<CONN){ctx.beginPath();ctx.moveTo(pts[i].x*W,pts[i].y*H);ctx.lineTo(pts[j].x*W,pts[j].y*H);ctx.strokeStyle=`rgba(139,92,246,${.18*(1-dist/CONN)})`;ctx.lineWidth=.5;ctx.stroke();}}requestAnimationFrame(draw);}draw();})();

/* ── PURE CANVAS DOWNLOAD ── */
function wrapText(ctx,text,x,y,maxW,lineH){
  const words=text.split(' ');let line='',lines=[];
  words.forEach(w=>{const t=line?line+' '+w:w;if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}else line=t;});
  lines.push(line);
  lines.forEach((l,i)=>ctx.fillText(l,x,y+i*lineH));
  return lines.length*lineH;
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function drawBg(ctx,W,H,r){
  const[ar,ag,ab]=r.rgb;
  ctx.fillStyle="#05000f";ctx.fillRect(0,0,W,H);
  const o1=ctx.createRadialGradient(W*.85,0,0,W*.85,0,W*.65);
  o1.addColorStop(0,`rgba(${ar},${ag},${ab},.28)`);o1.addColorStop(1,`rgba(${ar},${ag},${ab},0)`);
  ctx.fillStyle=o1;ctx.fillRect(0,0,W,H);
  const o2=ctx.createRadialGradient(0,H,0,0,H,W*.55);
  o2.addColorStop(0,"rgba(70,20,180,.18)");o2.addColorStop(1,"rgba(70,20,180,0)");
  ctx.fillStyle=o2;ctx.fillRect(0,0,W,H);
}
function drawInsights(ctx,r,x,y,w){
  const[ar,ag,ab]=r.rgb,insH=r.ins.length*34+52;
  roundRect(ctx,x,y,w,insH,14);
  ctx.fillStyle="rgba(255,255,255,.03)";ctx.fill();
  ctx.strokeStyle="rgba(255,255,255,.07)";ctx.lineWidth=1;ctx.stroke();
  ctx.font="600 10px Manrope,sans-serif";ctx.fillStyle="rgba(255,255,255,.28)";
  ctx.fillText("ЧТО ПОКАЗАЛИ ВАШИ ОТВЕТЫ",x+16,y+20);
  r.ins.forEach((ins,i)=>{
    const iy=y+42+i*34;
    ctx.beginPath();ctx.arc(x+20,iy-4,4,0,Math.PI*2);
    ctx.fillStyle=r.accent;ctx.fill();
    ctx.font="400 12px Manrope,sans-serif";ctx.fillStyle="rgba(255,255,255,.62)";
    wrapText(ctx,ins,x+32,iy,w-48,18);
  });
  return insH;
}
function finalize(cv,btn){

    const url=URL.createObjectURL(blob),a=document.createElement("a");

/* VERTICAL — mobile portrait 1080×1920 style */
function drawVertical(r){
  const SC=2,W=720,PAD=44,[ar,ag,ab]=r.rgb;
  // measure height
  const tmp=document.createElement("canvas");
  const tc=tmp.getContext("2d");tc.font="300 14px Manrope,sans-serif";

  const insH=r.ins.length*34+52;
  const advH=r.adv.length*110+50;
  const H=PAD*2+60+20+40+20+descH+20+insH+20+advH+60;
  const cv=document.createElement("canvas");
  cv.width=W*SC;cv.height=H*SC;
  const ctx=cv.getContext("2d");ctx.scale(SC,SC);

  ctx.textAlign="center";ctx.fillText("ФИНАНСОВАЯ ДИАГНОСТИКА",W/2,PAD);ctx.textAlign="left";

  let y=PAD+24;

  // emoji centered
  ctx.font="56px serif";ctx.textAlign="center";ctx.fillText(r.emoji,W/2,y+42);ctx.textAlign="left";
  y+=68;

  // title centered
  ctx.font="700 30px Georgia,serif";ctx.fillStyle="#fff";ctx.textAlign="center";
  ctx.fillText(r.title,W/2,y);ctx.textAlign="left";y+=28;

  // subtitle centered
  ctx.font="500 13px Manrope,sans-serif";ctx.fillStyle=r.accent;ctx.textAlign="center";
  ctx.fillText(r.sub,W/2,y);ctx.textAlign="left";y+=26;

  // divider
  ctx.strokeStyle=`rgba(${ar},${ag},${ab},.25)`;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(PAD*2,y);ctx.lineTo(W-PAD*2,y);ctx.stroke();y+=20;

  // description
  ctx.font="300 14px Manrope,sans-serif";ctx.fillStyle="rgba(255,255,255,.58)";
  y+=wrapText(ctx,r.desc,PAD,y,textW,22)+16;

  // insights
  y+=drawInsights(ctx,r,PAD,y,W-PAD*2)+20;

  // advice heading
  ctx.font="italic 600 18px Georgia,serif";ctx.fillStyle="#fff";
  ctx.textAlign="center";ctx.fillText("Рекомендации для роста",W/2,y+16);ctx.textAlign="left";y+=40;

  // advice cards stacked
  r.adv.forEach((a)=>{
    roundRect(ctx,PAD,y,W-PAD*2,96,14);
    ctx.fillStyle="rgba(255,255,255,.035)";ctx.fill();
    ctx.strokeStyle="rgba(255,255,255,.08)";ctx.lineWidth=1;ctx.stroke();
    ctx.font="22px serif";ctx.fillText(a.i,PAD+16,y+34);

    ctx.font="300 11px Manrope,sans-serif";ctx.fillStyle="rgba(255,255,255,.45)";
    wrapText(ctx,a.x,PAD+52,y+46,W-PAD*2-68,16);
    y+=108;
  });

  // footer
  ctx.font="400 10px Manrope,sans-serif";ctx.fillStyle="rgba(255,255,255,.15)";
  ctx.textAlign="center";ctx.fillText("финансовая диагностика барьеров роста",W/2,y+24);
  return cv;
}

/* HORIZONTAL — desktop landscape 1600×800 style */
function drawHorizontal(r){
  const SC=2,W=1200,H=680,PAD=52,[ar,ag,ab]=r.rgb;
  const cv=document.createElement("canvas");
  cv.width=W*SC;cv.height=H*SC;
  const ctx=cv.getContext("2d");ctx.scale(SC,SC);
  drawBg(ctx,W,H,r);

  // header
  ctx.font="600 10px Manrope,sans-serif";ctx.fillStyle="rgba(255,255,255,.22)";
  ctx.fillText("ФИНАНСОВАЯ ДИАГНОСТИКА · БАРЬЕР РОСТА ДОХОДА",PAD,PAD);

  const COL=W/2-PAD-20; // left column width
  let y=PAD+28;

  // emoji + title row
  ctx.font="52px serif";ctx.fillText(r.emoji,PAD,y+38);
  ctx.font="700 34px Georgia,serif";ctx.fillStyle="#fff";ctx.fillText(r.title,PAD+66,y+20);
  ctx.font="500 13px Manrope,sans-serif";ctx.fillStyle=r.accent;ctx.fillText(r.sub,PAD+66,y+42);
  y+=72;

  // description
  ctx.font="300 13px Manrope,sans-serif";ctx.fillStyle="rgba(255,255,255,.58)";
  const dh=wrapText(ctx,r.desc,PAD,y,COL,20);y+=dh+20;

  // insights
  drawInsights(ctx,r,PAD,y,COL);

  // RIGHT COLUMN — advice cards
  const rx=W/2+20,cw=(W/2-PAD-20-12)/1; // full width in right col
  ctx.font="italic 600 18px Georgia,serif";ctx.fillStyle="#fff";
  ctx.fillText("Рекомендации для роста",rx,PAD+28+16);

  r.adv.forEach((a,i)=>{
    const cy=PAD+60+i*186;
    roundRect(ctx,rx,cy,W/2-PAD-20,170,14);
    ctx.fillStyle="rgba(255,255,255,.035)";ctx.fill();
    ctx.strokeStyle=`rgba(${ar},${ag},${ab},.18)`;ctx.lineWidth=1;ctx.stroke();
    ctx.font="28px serif";ctx.fillText(a.i,rx+18,cy+40);
    ctx.font="600 15px Georgia,serif";ctx.fillStyle="#fff";ctx.fillText(a.t,rx+60,cy+34);
    ctx.font="300 12px Manrope,sans-serif";ctx.fillStyle="rgba(255,255,255,.48)";
    wrapText(ctx,a.x,rx+18,cy+62,W/2-PAD-56,18);
  });

  // footer
  ctx.font="400 10px Manrope,sans-serif";ctx.fillStyle="rgba(255,255,255,.15)";
  ctx.textAlign="right";ctx.fillText("финансовая диагностика барьеров роста",W-PAD,H-PAD/2+10);
  return cv;
}

function drawAndDownload(r){
  const btn=document.getElementById("dlBtn");
  btn.textContent="Генерируем...";btn.disabled=true;
  const isMobile=window.innerWidth<768;
  const cv=isMobile?drawVertical(r):drawHorizontal(r);
  finalize(cv,btn);
}

function startQuiz(){S.cur=0;S.answers=[];S.sel=null;showQuiz();}
function restart(){S.cur=0;S.answers=[];S.sel=null;showHero();}
showHero();
</script>
